<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>幸運刮刮樂</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;flex-direction:column;align-items:center;color:#fff;padding:20px 16px;user-select:none;-webkit-user-select:none}
.top-bar{width:100%;max-width:380px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.top-bar h1{font-size:1.5rem;text-shadow:0 0 15px rgba(255,215,0,.4)}
.coins{background:rgba(255,215,0,.15);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:6px 14px;font-size:.9rem;color:#ffd700}
.card-wrapper{width:100%;max-width:380px;margin-bottom:16px}
.card-header{background:linear-gradient(90deg,#ffd700,#f0a500);color:#1a1a2e;text-align:center;padding:10px;border-radius:16px 16px 0 0;font-weight:bold;font-size:1.1rem;letter-spacing:2px}
.card-container{position:relative;width:100%;height:220px;overflow:hidden;border-radius:0 0 16px 16px;box-shadow:0 8px 32px rgba(0,0,0,.4);border:2px solid #ffd700;border-top:none;background:#222}
.prize-layer{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1}
.prize-layer .prize-emoji{font-size:3.2rem;margin-bottom:6px}
.prize-layer .prize-text{font-size:1.8rem;font-weight:bold;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.prize-layer .prize-sub{font-size:.9rem;margin-top:4px;opacity:.8}
#scratchCanvas{position:absolute;top:0;left:0;z-index:2;cursor:pointer;touch-action:none}
.progress-bar{width:100%;max-width:380px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#ffd700,#ff6b6b);border-radius:3px;transition:width .3s}
.hint{font-size:.8rem;color:#888;margin-bottom:16px}
.stats-grid{width:100%;max-width:380px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 8px;text-align:center}
.stat-box .label{font-size:.75rem;color:#888;margin-bottom:4px}
.stat-box .value{font-size:1.3rem;font-weight:bold;color:#ffd700}
.btn-row{width:100%;max-width:380px;display:flex;gap:10px;margin-bottom:16px}
.btn{flex:1;padding:14px;font-size:1rem;font-weight:bold;border:none;border-radius:12px;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#ffd700,#f0a500);color:#1a1a2e;box-shadow:0 4px 15px rgba(255,215,0,.3)}
.btn-secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
.btn:active{transform:scale(.96)}
.daily-box{width:100%;max-width:380px;background:linear-gradient(135deg,rgba(255,107,107,.15),rgba(255,215,0,.15));border:1px solid rgba(255,215,0,.2);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center}
.daily-box .title{font-size:.9rem;color:#ffd700;margin-bottom:4px}
.daily-box .desc{font-size:.8rem;color:#aaa}
.ad-space{width:100%;max-width:380px;height:60px;background:rgba(0,0,0,.3);border:1px dashed rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#555;font-size:.75rem;margin-bottom:12px}
.history{width:100%;max-width:380px;margin-bottom:16px}
.history h3{font-size:.9rem;color:#888;margin-bottom:8px}
.history-list{display:flex;flex-direction:column;gap:6px}
.history-item{background:rgba(255,255,255,.05);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.history-item .win{color:#ffd700}
.history-item .lose{color:#888}
.history-item .time{color:#666;font-size:.75rem}
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100}
@keyframes cf{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes pp{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.prize-revealed{animation:pp .5s ease-out}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#1e2a4a;border:2px solid #ffd700;border-radius:20px;padding:30px;text-align:center;max-width:320px;width:90%}
.modal .emoji{font-size:4rem;margin-bottom:10px}
.modal .title{font-size:1.5rem;font-weight:bold;color:#ffd700;margin-bottom:6px}
.modal .sub{color:#aaa;margin-bottom:20px}
.modal .btn{width:100%}
</style>
</head>
<body>
<div class="top-bar"><h1>🎰 幸運刮刮樂</h1><div class="coins" id="coinsDisplay">🪙 0</div></div>
<div class="daily-box"><div class="title">🔥 每日挑戰：刮滿 5 張拿獎勵！</div><div class="desc" id="dailyProgress">進度：0 / 5</div></div>
<div class="card-wrapper">
  <div class="card-header" id="cardTitle">第 1 張刮刮樂</div>
  <div class="card-container" id="cardContainer">
    <div class="prize-layer" id="prizeLayer"></div>
    <canvas id="scratchCanvas"></canvas>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<p class="hint" id="hintText">👆 用手指刮開灰色塗層</p>
<div class="ad-space">📢 廣告位</div>
<div class="stats-grid">
  <div class="stat-box"><div class="label">已刮</div><div class="value" id="totalCards">0</div></div>
  <div class="stat-box"><div class="label">中獎</div><div class="value" id="totalWins">0</div></div>
  <div class="stat-box"><div class="label">累計獎金</div><div class="value" id="totalPrize">$0</div></div>
</div>
<div class="btn-row">
  <button class="btn btn-primary" id="newCardBtn">🎫 再來一張</button>
  <button class="btn btn-secondary" id="shareBtn">📢 分享</button>
</div>
<div class="history"><h3>📋 最近紀錄</h3><div class="history-list" id="historyList"></div></div>
<div class="confetti-container" id="confettiContainer"></div>
<div class="modal-overlay" id="winModal">
  <div class="modal">
    <div class="emoji" id="modalEmoji">🎉</div>
    <div class="title" id="modalTitle">恭喜中獎！</div>
    <div class="sub" id="modalSub"></div>
    <button class="btn btn-primary" id="modalBtn">🎰 繼續刮</button>
  </div>
</div>
<script>
var PRIZES=[
{emoji:'💰',text:'NT$ 1,000,000',sub:'頭獎！百萬大獎！',value:1000000,weight:1,bg:'linear-gradient(135deg,#ff416c,#ff4b2b)'},
{emoji:'🎉',text:'NT$ 100,000',sub:'十萬獎金！',value:100000,weight:2,bg:'linear-gradient(135deg,#f857a6,#ff5858)'},
{emoji:'🏆',text:'NT$ 10,000',sub:'恭喜中獎！',value:10000,weight:5,bg:'linear-gradient(135deg,#ffd700,#ff8c00)'},
{emoji:'🎁',text:'NT$ 1,000',sub:'小獎不錯！',value:1000,weight:12,bg:'linear-gradient(135deg,#56ab2f,#a8e063)'},
{emoji:'🍀',text:'NT$ 500',sub:'幸運五百',value:500,weight:18,bg:'linear-gradient(135deg,#11998e,#38ef7d)'},
{emoji:'🎈',text:'NT$ 100',sub:'回本了！',value:100,weight:25,bg:'linear-gradient(135deg,#667eea,#764ba2)'},
{emoji:'😅',text:'再接再厲',sub:'下次一定中！',value:0,weight:37,bg:'linear-gradient(135deg,#434343,#000)'}
];
var canvas=document.getElementById('scratchCanvas');
var ctx=canvas.getContext('2d');
var container=document.getElementById('cardContainer');
var prizeLayer=document.getElementById('prizeLayer');
var progressFill=document.getElementById('progressFill');
var hintText=document.getElementById('hintText');
var confettiContainer=document.getElementById('confettiContainer');
var winModal=document.getElementById('winModal');
var isDrawing=false,revealed=false;
var hist=[];try{hist=JSON.parse(localStorage.getItem('sh')||'[]')}catch(e){}
var stats;try{stats=JSON.parse(localStorage.getItem('ss'))}catch(e){}
if(!stats)stats={cards:0,wins:0,prize:0,coins:0,dp:0,ld:''};
var today=new Date().toISOString().slice(0,10);
if(stats.ld!==today){stats.dp=0;stats.ld=today}

function save(){try{localStorage.setItem('ss',JSON.stringify(stats));localStorage.setItem('sh',JSON.stringify(hist.slice(0,20)))}catch(e){}}

function updateUI(){
document.getElementById('totalCards').textContent=stats.cards;
document.getElementById('totalWins').textContent=stats.wins;
document.getElementById('totalPrize').textContent='$'+stats.prize.toLocaleString();
document.getElementById('coinsDisplay').textContent='🪙 '+stats.coins;
document.getElementById('dailyProgress').textContent='進度：'+Math.min(stats.dp,5)+' / 5';
document.getElementById('cardTitle').textContent='第 '+(stats.cards+1)+' 張刮刮樂';
var list=document.getElementById('historyList');list.innerHTML='';
hist.slice(0,5).forEach(function(h){
var d=document.createElement('div');d.className='history-item';
d.innerHTML='<span class="'+(h.v>0?'win':'lose')+'">'+h.e+' '+h.t+'</span><span class="time">'+h.tm+'</span>';
list.appendChild(d);
});
}

function pick(){
var total=0;for(var i=0;i<PRIZES.length;i++)total+=PRIZES[i].weight;
var r=Math.random()*total;
for(var i=0;i<PRIZES.length;i++){r-=PRIZES[i].weight;if(r<=0)return PRIZES[i];}
return PRIZES[PRIZES.length-1];
}

function initCard(){
var w=container.clientWidth;
var h=container.clientHeight;
if(w<10||h<10){setTimeout(initCard,200);return;}
canvas.width=w;
canvas.height=h;
canvas.style.width=w+'px';
canvas.style.height=h+'px';
revealed=false;
hintText.textContent='👆 用手指刮開灰色塗層';
progressFill.style.width='0%';
var prize=pick();
prizeLayer.innerHTML='';
prizeLayer.style.background=prize.bg;
prizeLayer.className='prize-layer';
prizeLayer.setAttribute('data-v',prize.value);
prizeLayer.setAttribute('data-e',prize.emoji);
prizeLayer.setAttribute('data-t',prize.text);
prizeLayer.setAttribute('data-s',prize.sub);
var pe=document.createElement('div');pe.className='prize-emoji';pe.textContent=prize.emoji;
var pt=document.createElement('div');pt.className='prize-text';pt.textContent=prize.text;pt.style.color=prize.value>0?'#fff':'#ccc';
var ps=document.createElement('div');ps.className='prize-sub';ps.textContent=prize.sub;
prizeLayer.appendChild(pe);prizeLayer.appendChild(pt);prizeLayer.appendChild(ps);
// draw grey scratch layer
ctx.globalCompositeOperation='source-over';
var g=ctx.createLinearGradient(0,0,w,h);
g.addColorStop(0,'#b8b8b8');g.addColorStop(0.5,'#d0d0d0');g.addColorStop(1,'#a8a8a8');
ctx.fillStyle=g;
ctx.fillRect(0,0,w,h);
ctx.fillStyle='#aaa';ctx.font='bold 20px sans-serif';ctx.textAlign='center';
ctx.fillText('✨ 刮開這裡 ✨',w/2,h/2-10);
ctx.font='13px sans-serif';ctx.fillStyle='#999';
ctx.fillText('Scratch Here',w/2,h/2+15);
ctx.globalCompositeOperation='destination-out';
updateUI();
}

function doScratch(x,y){
ctx.beginPath();ctx.arc(x,y,24,0,Math.PI*2);ctx.fill();
if(!revealed)checkPct();
}

function getXY(e){
var r=canvas.getBoundingClientRect();
var src=e.touches?e.touches[0]:e;
return{x:src.clientX-r.left,y:src.clientY-r.top};
}

function checkPct(){
var d=ctx.getImageData(0,0,canvas.width,canvas.height).data;
var t=0,c=0;
for(var i=3;i<d.length;i+=16){t++;if(d[i]===0)c++;}
var pct=c/t;
progressFill.style.width=Math.min(pct*100,100)+'%';
if(pct>=0.55)reveal();
}

function reveal(){
if(revealed)return;
revealed=true;
ctx.globalCompositeOperation='source-over';
ctx.clearRect(0,0,canvas.width,canvas.height);
prizeLayer.className='prize-layer prize-revealed';
progressFill.style.width='100%';
var v=parseInt(prizeLayer.getAttribute('data-v'));
var em=prizeLayer.getAttribute('data-e');
var tx=prizeLayer.getAttribute('data-t');
var sb=prizeLayer.getAttribute('data-s');
stats.cards++;stats.dp++;
var now=new Date();
var tm=('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2);
if(v>0){
stats.wins++;stats.prize+=v;stats.coins+=Math.floor(v/100);
hintText.textContent='🎊 恭喜中獎！';
confetti();
document.getElementById('modalEmoji').textContent=em;
document.getElementById('modalTitle').textContent='恭喜中獎！';
document.getElementById('modalSub').textContent=tx+' — '+sb;
winModal.classList.add('active');
}else{
stats.coins+=1;
hintText.textContent='😅 沒中，再試試！';
}
hist.unshift({e:em,t:tx,v:v,tm:tm});
if(hist.length>20)hist.pop();
if(stats.dp===5){stats.coins+=50;setTimeout(function(){alert('🎯 每日挑戰完成！+50 🪙')},800);}
save();updateUI();
}

function confetti(){
var colors=['#ffd700','#ff6b6b','#4ecdc4','#45b7d1','#96e6a1','#dda0dd','#ff9a56'];
for(var i=0;i<50;i++){
var c=document.createElement('div');
c.style.cssText='position:absolute;left:'+Math.random()*100+'%;top:-10px;width:'+(Math.random()*8+4)+'px;height:'+(Math.random()*8+4)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';border-radius:'+(Math.random()>.5?'50%':'2px')+';opacity:0;animation:cf '+(Math.random()*2+1.5)+'s ease-out '+(Math.random()*0.5)+'s forwards;';
confettiContainer.appendChild(c);
}
setTimeout(function(){confettiContainer.innerHTML='';},4000);
}

// Touch & mouse events
canvas.addEventListener('mousedown',function(e){isDrawing=true;var p=getXY(e);doScratch(p.x,p.y);});
canvas.addEventListener('mousemove',function(e){if(isDrawing){var p=getXY(e);doScratch(p.x,p.y);}});
canvas.addEventListener('mouseup',function(){isDrawing=false;});
canvas.addEventListener('mouseleave',function(){isDrawing=false;});
canvas.addEventListener('touchstart',function(e){e.preventDefault();isDrawing=true;var p=getXY(e);doScratch(p.x,p.y);},{passive:false});
canvas.addEventListener('touchmove',function(e){e.preventDefault();if(isDrawing){var p=getXY(e);doScratch(p.x,p.y);}},{passive:false});
canvas.addEventListener('touchend',function(){isDrawing=false;});

document.getElementById('newCardBtn').addEventListener('click',function(){initCard();});
document.getElementById('modalBtn').addEventListener('click',function(){winModal.classList.remove('active');initCard();});
document.getElementById('shareBtn').addEventListener('click',function(){
if(navigator.share){navigator.share({title:'幸運刮刮樂',text:'來試試你的手氣 🎰',url:location.href});}
else{alert('把這個網址分享給朋友：\n'+location.href);}
});

// INIT
window.addEventListener('DOMContentLoaded',function(){
updateUI();
setTimeout(initCard,300);
});
</script>
</body>
</html>
